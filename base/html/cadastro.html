<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="icon" href="../assets/icon/x_icon.png">
    <link rel="stylesheet" href="../css/cadastro_style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Zetta:wght@100..900&display=swap" rel="stylesheet">
</head>

<body>
    <div class="backgroundTop">
        <div class="topButtons">
            <a href="./pagina_inicial.html" class="link">INÍCIO</a>
            <a href="./minecraft.html" class="link">MINECRAFT</a>
            <a href="./projetos.html" class="link">PROJETOS</a>
            <a href="./website.html" class="link">WEBSITE</a>
        </div>
    </div>
    <div class="background1">
        <div class="cadastro">CADASTRO</div>
        <div class="desc">
            Preencha seus dados corretamente. Usaremos essas informações apenas para o seu cadastro.
            <div class="endButton">
                Já tem cadastro? então faça:
                <a href="./login.html" class="login">Login</a>
            </div>
        </div>
        <div class="base1">
            <div class="ipt1">
                <div class="nome">
                    Nome
                    <input type="text" id="ipt_nome" placeholder="Seu Nome">
                </div>
                <div class="sobrenome">
                    Sobrenome
                    <input type="text" id="ipt_sobrenome" placeholder="Seu Sobrenome">
                </div>
            </div>
            <div class="ipt2">
                <div class="email">
                    E-Mail
                    <input type="text" id="ipt_email" placeholder="SeuEmailAqui@e-mail.com">
                </div>
                <div class="Cemail">
                    Confirmação de e-mail
                    <input type="text" id="ipt_Cemail" placeholder="ConfirmaçãoDoSeuEmailAqui@e-mail.com">
                </div>
            </div>
            <div class="ipt3">
                <div class="senha">
                    Senha
                    <input type="password" id="ipt_senha" placeholder="SenhaSuperSecreta🤫">
                </div>
                <div class="Csenha">
                    Confirmação de senha
                    <input type="password" id="ipt_Csenha" placeholder="ConfirmaçãoDaSenhaSuperSecreta🤫">
                </div>
            </div>
            <div class="botao">
                <button onclick="botao()">Confirmar</button>
            </div>
        </div>
    </div>
    <div class="finalPage">
        Website desenvolvido por
        <b>Leandro Mendes</b>
    </div>
</body>

</html>
<script>
    let lista_nome = []
    let lista_sobrenome = []
    let lista_email = []
    let lista_Cemail = []
    let lista_senha = []
    let lista_Csenha = []
    function botao() {
        let var_nome = ipt_nome.value;
        let var_sobrenome = ipt_sobrenome.value;
        let var_email = ipt_email.value;
        let var_Cemail = ipt_Cemail.value;
        let var_senha = ipt_senha.value;
        let var_Csenha = ipt_Csenha.value;

        if (
            var_nome == `` ||
            var_sobrenome == `` ||
            var_email == `` ||
            var_Cemail == `` ||
            var_senha == `` ||
            var_Csenha == ``
        ) {
            alert("Preencha todos os campos!");
        } else {
            lista_nome.push(var_nome);
            lista_sobrenome.push(var_sobrenome);
            lista_email.push(var_email);
            lista_Cemail.push(var_Cemail);
            lista_senha.push(var_senha);
            lista_Csenha.push(var_Csenha);
        }
    }
</script>
