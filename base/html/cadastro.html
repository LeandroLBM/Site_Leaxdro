        <div class="topButtons">

            <a href="./projetos.html" class="link">PROJETOS</a>

                    Sobrenome
                    <input type="text" id="ipt_sobrenome">
                </div>
            </div>
            <div class="ipt2">
                <div class="email">
                    E-Mail
                    <input type="text" id="ipt_nome">
                </div>

                    Confirmação de e-mail
                    <input type="text" id="ipt_sobrenome">
                </div>
            </div>
            <div class="ipt3">
                <div class="senha">
                    Senha
                    <input type="text" id="ipt_nome">
                </div>
                <div class="Csenha">
                    Confirmação de senha
                    <input type="text" id="ipt_sobrenome">
                </div>
            </div>
            <div class="botao">
                <button onclick="botao()">Confirmar</button>
            </div>
        </div>
    </div>
