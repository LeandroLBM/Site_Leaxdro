<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="icon" href="../assets/icon/x_icon.png">
    <link rel="stylesheet" href="../css/login_style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Zetta:wght@100..900&display=swap" rel="stylesheet">
</head>

<body>
    <div class="backgroundTop">
        <div class="topButtons">
            <a href="./pagina_inicial.html" class="link">INÍCIO</a>
            <a href="./minecraft.html" class="link">MINECRAFT</a>
            <a href="./projetos.html" class="link">PROJETOS</a>
            <a href="./website.html" class="link">WEBSITE</a>
        </div>
    </div>
    <div class="background1">
        <div class="card_erro" id="cardErro">
            <span id="mensagem_erro"></span>
        </div>

        <div class="login">LOGIN</div>
        <div class="desc">
            Preencha seus dados corretamente. Para o login na plataforma.
            <div class="endButton">
                Não tem cadastro? então faça um:
                <a href="./cadastro.html" class="cadastro">Cadastro</a>
            </div>
        </div>
        <div class="base1">
            <div class="email">
                E-Mail
                <input type="text" id="ipt_email" placeholder="SeuEmailAqui@E-Mail.com">
            </div>
            <div class="senha">
                Senha
                <input type="text" id="ipt_senha" placeholder="SenhaSuperSecreta🤫">
            </div>
            <div class="botao">
                <button onclick="botao()">Confirmar</button>
            </div>
            <div id="div_aguardar" class="loading">
                <img src="../assets/icon/gif_loading.gif" id="loading-gif" />
            </div>

            <div id="div_erros_login"></div>
        </div>
    </div>
    <div class="finalPage">
        Website desenvolvido por
        <b>Leandro Mendes</b>
    </div>
</body>

</html>
<script>
    function botao() {

        let var_email = ipt_email.value;
        let var_senha = ipt_senha.value;

        if (var_email == `` || var_senha == ``) {
            cardErro.style.display = "block";
            mensagem_erro.innerHTML = `Erro! Algum campo não está preenchido corretamente!`;
            finalizarAguardar();
            return false;
        }

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: var_email,
                senhaServer: var_senha
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.id;
                    sessionStorage.LEAXDRO = JSON.stringify(json.leaxdro)

                    setTimeout(function () {
                        window.location = "./dashboard/cards.html";
                    }, 1000); // apenas para exibir o loading

                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }

    function sumirMensagem() {
        cardErro.style.display = "none"
    }

</script>
