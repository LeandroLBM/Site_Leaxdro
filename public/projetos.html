<script>
function exibir(id) {

    let img = document.getElementById(id);

    displayAbsolute.style.display = "flex";

    displayAbsolute.innerHTML = `
        <button onclick="fechar()">
            <img id="imgButton" src="./icon/x_icon.png">
        </button>
        ${img.outerHTML}
    `;
}
    function fechar() {
        displayAbsolute.style.display = "none";
    }
</script>
